<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiến Dịch Làm Sạch Đại Dương</title>
    <style>
        body { 
            margin: 0; text-align: center; background-color: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2c3e50;
            overflow: hidden; touch-action: manipulation;
        }
        #gameWrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 10px; box-sizing: border-box; position: relative; }
        canvas { 
            width: 100%; height: auto; border: 6px solid #00acc1; 
            background-color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 12px;
        }
        .stats { display: flex; justify-content: center; gap: 20px; font-size: 1.1em; font-weight: bold; margin: 10px 0; }
        .controls { margin-bottom: 10px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; min-height: 50px; }
        
        button { 
            padding: 10px 18px; font-size: 14px; cursor: pointer; border: none; 
            border-radius: 25px; color: white; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        
        .btn-time { background: #00bcd4; }
        .btn-time.active { background: #008ba3; transform: scale(0.9); }
        #startBtn { background: linear-gradient(135deg, #43a047, #2e7d32); }
        #pauseBtn { background: linear-gradient(135deg, #fb8c00, #ef6c00); display: none; }
        #resetBtn { background: linear-gradient(135deg, #e53935, #b71c1c); display: none; }
        
        /* Màn hình tạm dừng - Đã fix lỗi hiển thị trên điện thoại */
        #pauseOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 50, 50, 0.9); display: none; border-radius: 12px;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10; pointer-events: none; padding: 20px; box-sizing: border-box;
            text-align: center;
        }
        
        #pauseOverlay h2 { 
            margin: 0 0 15px 0; 
            font-size: 8vw; /* Chữ co giãn theo màn hình */
            color: #ffeb3b; 
            line-height: 1.2;
        }
        
        #pauseOverlay p { 
            margin: 0 0 10px 0; 
            font-size: 4vw; 
            line-height: 1.4; 
        }
        
        #pauseOverlay .sub-note { 
            font-size: 3.5vw; 
            font-style: italic; 
            color: #b2ebf2; 
            margin-top: 15px;
        }

        /* Điều chỉnh cho màn hình lớn (Máy tính) */
        @media (min-width: 600px) {
            #pauseOverlay h2 { font-size: 2.5em; }
            #pauseOverlay p { font-size: 1.3em; }
            #pauseOverlay .sub-note { font-size: 1.1em; }
        }

        .note { font-size: 0.9em; color: #00796b; font-style: italic; margin-bottom: 5px; }
        #timeModeContainer { display: flex; gap: 5px; align-items: center; }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <h1 style="color: #00796b; margin-bottom: 5px;">🌊 GIẢI CỨU ĐẠI DƯƠNG</h1>
        <div class="note">Cùng nhau dọn rác để bảo vệ môi trường biển nhé! ✨</div>
        
        <div class="controls">
            <div id="timeModeContainer">
                <button class="btn-time active" data-time="60">1 Phút</button>
                <button class="btn-time" data-time="120">2 Phút</button>
                <button class="btn-time" data-time="180">3 Phút</button>
            </div>
            <button id="startBtn">Bắt đầu chơi</button>
            <button id="pauseBtn">Tạm dừng</button>
            <button id="resetBtn">Kết thúc</button>
        </div>

        <div class="stats">
            <div>⭐ Điểm: <span id="scoreVal">0</span></div>
            <div>🏆 Kỉ lục: <span id="highScoreVal">0</span></div>
            <div>⏰ Còn: <span id="timeVal">60</span>s</div>
        </div>
        
        <div style="position: relative; line-height: 0;">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
            <div id="pauseOverlay">
                <h2>⏸️ ĐANG TẠM DỪNG</h2>
                <p>Nghỉ tay một xíu rồi quay lại nhé!</p>
                <div class="sub-note">Đại dương và các bạn cá vẫn đang đợi bạn đó... ✨</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreVal');
        const highScoreDisplay = document.getElementById('highScoreVal');
        const timeDisplay = document.getElementById('timeVal');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timeButtons = document.querySelectorAll('.btn-time');
        const pauseOverlay = document.getElementById('pauseOverlay');

        let score, timeLeft, isGameOver, isPaused, isStarted, timerInterval, items, animationId;
        let selectedTime = 60, gameTick = 0, alertText = "", alertTimer = 0;
        let floatingScores = [];
        let highScore = localStorage.getItem('oceanHighScore') || 0;
        highScoreDisplay.innerText = highScore;

        let lastTime = 0;
        let trashQueue = []; 

        let hook = {
            x: canvas.width / 2, y: 55, angle: 0, angleDir: 1, length: 40,
            extending: false, returning: false, 
            baseSpeed: 180, 
            missReturnSpeed: 150, 
            rotationSpeed: 0.72,
            currentPullSpeed: 0,
            targetItem: null
        };

        const trashPool = ['🦴', '🍎', '🥫', '👞']; 
        const fishEmojis = ['🐠', '🐟'];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function refreshTrashQueue() {
            let pool = ['🦴', '🦴', '🍎', '🍎', '🥫', '🥫', '👞']; 
            trashQueue = shuffle([...pool]);
        }

        function createItem(type, excludeEmoji = null) {
            const isFish = type === 'fish';
            let selectedEmoji;

            if (isFish) {
                selectedEmoji = fishEmojis[Math.floor(Math.random() * fishEmojis.length)];
            } else {
                if (trashQueue.length === 0) refreshTrashQueue();
                selectedEmoji = trashQueue.pop();
                if (selectedEmoji === excludeEmoji && trashQueue.length > 0) {
                    trashQueue.unshift(selectedEmoji);
                    selectedEmoji = trashQueue.pop();
                }
            }

            return {
                x: Math.random() * (canvas.width - 140) + 70,
                y: Math.random() * (canvas.height - 220) + 160, 
                emoji: selectedEmoji,
                size: isFish ? 45 : 40,
                type: type, 
                points: selectedEmoji === '👞' ? 100 : 50,
                pullSpeed: selectedEmoji === '👞' ? 45 : 80,
                offset: Math.random() * 200, 
                swimSpeed: 2.0 
            };
        }

        function drawBackground() {
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#e0f7fa');
            gradient.addColorStop(0.2, '#4fc3f7');
            gradient.addColorStop(1, '#01579b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function initGame() {
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            score = 0; timeLeft = selectedTime; isGameOver = false; isPaused = false; isStarted = false;
            alertText = ""; alertTimer = 0; floatingScores = []; trashQueue = [];
            hook.length = 40; hook.extending = false; hook.returning = false; hook.targetItem = null;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = timeLeft;
            pauseOverlay.style.display = "none";
            
            startBtn.style.display = "inline-block";
            timeModeContainer.style.display = "flex";
            pauseBtn.style.display = "none";
            resetBtn.style.display = "none";
            
            items = [];
            for(let i=0; i<6; i++) items.push(createItem('trash'));
            for(let i=0; i<3; i++) items.push(createItem('fish'));
            drawBackground();
            
            ctx.fillStyle = "#00796b";
            ctx.font = "bold 22px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Chào mừng bạn đến với chiến dịch dọn rác biển!", canvas.width/2, canvas.height/2 + 40);
            ctx.font = "18px Arial";
            ctx.fillText("Hãy nhấn nút Bắt đầu để cùng giải cứu đại dương.", canvas.width/2, canvas.height/2 + 75);
        }

        function endGame(isSurrender = false) {
            isGameOver = true; isStarted = false;
            clearInterval(timerInterval);
            pauseOverlay.style.display = "none";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('oceanHighScore', highScore);
                highScoreDisplay.innerText = highScore;
            }
            ctx.fillStyle = "rgba(0, 50, 50, 0.9)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center";
            
            ctx.fillStyle = "#ffeb3b"; ctx.font = "bold 28px Arial";
            ctx.fillText(isSurrender ? "Hẹn gặp lại bạn lần sau!" : "Chúc mừng bạn đã hoàn thành nhiệm vụ!", canvas.width/2, canvas.height/2 - 20);
            ctx.fillStyle = "white"; ctx.font = "20px Arial";
            ctx.fillText("Kết quả: Bạn đã thu gom được " + score + " điểm rác.", canvas.width/2, canvas.height/2 + 25);
            ctx.fillStyle = "#b2ebf2"; ctx.font = "italic 16px Arial";
            ctx.fillText("Cảm ơn bạn đã góp sức bảo vệ môi trường biển sạch đẹp hơn.", canvas.width/2, canvas.height/2 + 65);
            
            startBtn.style.display = "inline-block";
            timeModeContainer.style.display = "flex";
            pauseBtn.style.display = "none";
            resetBtn.style.display = "none";
        }

        function animate(currentTime) {
            if (!isStarted || isGameOver) return;
            if (!lastTime) lastTime = currentTime;
            let dt = (currentTime - lastTime) / 1000; 
            lastTime = currentTime;
            if (dt > 0.1) dt = 0.016;

            if (!isPaused) {
                gameTick += dt;
                drawBackground();

                items.forEach(item => {
                    let swimX = item.type === 'fish' ? Math.sin((gameTick * 2 + item.offset)) * 10 : 0;
                    ctx.font = `${item.size}px Arial`; ctx.textAlign = "center";
                    ctx.fillText(item.emoji, item.x + swimX, item.y);
                });

                if (!hook.extending && !hook.returning) {
                    hook.angle += hook.rotationSpeed * dt * hook.angleDir;
                    if (Math.abs(hook.angle) > 1.4) hook.angleDir *= -1;
                } else if (hook.extending) {
                    hook.length += hook.baseSpeed * dt;
                    items.forEach((item, index) => {
                        let hX = hook.x + Math.sin(hook.angle)*hook.length;
                        let hY = hook.y + Math.cos(hook.angle)*hook.length;
                        if (getDistance(hX, hY, item.x, item.y) < 30) { 
                            hook.extending = false; hook.returning = true; hook.targetItem = index;
                            hook.currentPullSpeed = items[index].pullSpeed;
                        }
                    });
                    if (hook.length > 460) { 
                        hook.extending = false; hook.returning = true; 
                        hook.currentPullSpeed = hook.missReturnSpeed; 
                    }
                } else if (hook.returning) {
                    hook.length -= hook.currentPullSpeed * dt;
                    if (hook.targetItem !== null) {
                        items[hook.targetItem].x = hook.x + Math.sin(hook.angle) * hook.length;
                        items[hook.targetItem].y = hook.y + Math.cos(hook.angle) * hook.length;
                    }
                    if (hook.length <= 40) {
                        if (hook.targetItem !== null) {
                            const caught = items[hook.targetItem];
                            const caughtType = caught.type;
                            const caughtEmoji = caught.emoji;

                            if (caughtType === 'fish') {
                                timeLeft -= 5; 
                                alertText = "Chú ý: Đừng bắt nhầm cá bạn nhé! (-5s)"; 
                                alertTimer = 2.0; 
                            } else {
                                score += caught.points; 
                                scoreDisplay.innerText = score;
                                floatingScores.push({ x: hook.x, y: hook.y + 40, val: "+" + caught.points, life: 1.0 });
                            }
                            
                            items.splice(hook.targetItem, 1); 
                            items.push(createItem(caughtType, caughtEmoji));
                        }
                        hook.targetItem = null; hook.returning = false;
                        hook.length = 40;
                    }
                }

                const hX = hook.x + Math.sin(hook.angle) * hook.length;
                const hY = hook.y + Math.cos(hook.angle) * hook.length;
                ctx.beginPath(); ctx.moveTo(hook.x, hook.y); ctx.lineTo(hX, hY);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();
                ctx.font = "30px Arial"; ctx.fillText("⚓", hX, hY);

                floatingScores.forEach((fs, i) => {
                    ctx.fillStyle = `rgba(255, 235, 59, ${fs.life})`;
                    ctx.font = "bold 24px Arial";
                    ctx.fillText(fs.val, fs.x, fs.y);
                    fs.y -= 1; fs.life -= dt;
                    if (fs.life <= 0) floatingScores.splice(i, 1);
                });

                if (alertTimer > 0) {
                    ctx.fillStyle = "#ff5252";
                    ctx.font = "bold 22px Arial";
                    ctx.fillText(alertText, canvas.width/2, 100); 
                    alertTimer -= dt;
                }
            }
            animationId = requestAnimationFrame(animate);
        }

        function getDistance(x1, y1, x2, y2) { return Math.sqrt((x2 - x1)**2 + (y2 - y1)**2); }

        function handleAction() { 
            if (isStarted && !isPaused && !hook.extending && !hook.returning) {
                hook.extending = true; 
            }
        }

        timeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isStarted || isGameOver) {
                    timeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTime = parseInt(btn.getAttribute('data-time'));
                    timeDisplay.innerText = selectedTime;
                }
            });
        });

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleAction(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); }, {passive: false});
        canvas.addEventListener('mousedown', (e) => { handleAction(); });

        startBtn.addEventListener('click', () => {
            initGame(); isStarted = true; lastTime = 0;
            startBtn.style.display = "none"; timeModeContainer.style.display = "none";
            pauseBtn.style.display = "inline-block"; resetBtn.style.display = "inline-block";
            timerInterval = setInterval(() => { 
                if(!isPaused) { 
                    timeLeft--; timeDisplay.innerText = Math.max(0, timeLeft); 
                    if(timeLeft <= 0) endGame(); 
                }
            }, 1000);
            animationId = requestAnimationFrame(animate);
        });

        pauseBtn.addEventListener('click', () => { 
            isPaused = !isPaused; 
            pauseBtn.innerText = isPaused ? "Tiếp tục ngay" : "Tạm dừng"; 
            pauseOverlay.style.display = isPaused ? "flex" : "none";
            if (!isPaused) {
                lastTime = performance.now(); 
                requestAnimationFrame(animate);
            }
        });
        
        resetBtn.addEventListener('click', () => endGame(true));
        initGame();
    </script>
</body>
</html>
