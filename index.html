<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chiến Dịch Làm Sạch Đại Dương</title>
    <style>
        body { 
            margin: 0; text-align: center; background-color: #f0f4f8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2c3e50;
            overflow: hidden; touch-action: manipulation;
        }
        #gameWrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 10px; box-sizing: border-box; }
        canvas { 
            width: 100%; height: auto; border: 6px solid #00acc1; 
            background-color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-radius: 12px;
        }
        .stats { display: flex; justify-content: center; gap: 20px; font-size: 1.1em; font-weight: bold; margin: 10px 0; }
        .controls { margin-bottom: 10px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 8px; min-height: 50px; }
        
        button { 
            padding: 10px 18px; font-size: 14px; cursor: pointer; border: none; 
            border-radius: 25px; color: white; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        
        .btn-time { background: #00bcd4; }
        .btn-time.active { background: #008ba3; transform: scale(0.9); }
        #startBtn { background: linear-gradient(135deg, #43a047, #2e7d32); }
        #pauseBtn { background: linear-gradient(135deg, #fb8c00, #ef6c00); display: none; }
        #resetBtn { background: linear-gradient(135deg, #e53935, #b71c1c); display: none; }
        
        .note { font-size: 0.9em; color: #00796b; font-style: italic; margin-bottom: 5px; }
        #timeModeContainer { display: flex; gap: 5px; align-items: center; }

        @media (max-width: 600px) {
            h1 { font-size: 1.3em; margin: 10px 0 5px 0; }
            .stats { font-size: 0.95em; gap: 10px; }
            button { padding: 8px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="gameWrapper">
        <h1 style="color: #00796b; margin-bottom: 5px;">🌊 GIẢI CỨU ĐẠI DƯƠNG XANH ✨</h1>
        <div class="note">Đừng làm đau các bạn cá để không bị phạt nhé! 🐠💕</div>
        
        <div class="controls">
            <div id="timeModeContainer">
                <button class="btn-time active" data-time="60">1 Phút</button>
                <button class="btn-time" data-time="120">2 Phút</button>
                <button class="btn-time" data-time="180">3 Phút</button>
            </div>
            <button id="startBtn">Bắt đầu ngay</button>
            <button id="pauseBtn">Tạm dừng tí</button>
            <button id="resetBtn">Bỏ cuộc mất rồi</button>
        </div>

        <div class="stats">
            <div>⭐ Điểm: <span id="scoreVal">0</span></div>
            <div>🏆 Kỉ lục: <span id="highScoreVal">0</span></div>
            <div>⏰ Còn: <span id="timeVal">60</span>s</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreVal');
        const highScoreDisplay = document.getElementById('highScoreVal');
        const timeDisplay = document.getElementById('timeVal');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timeModeContainer = document.getElementById('timeModeContainer');
        const timeButtons = document.querySelectorAll('.btn-time');

        let score, timeLeft, isGameOver, isPaused, isStarted, timerInterval, items, animationId;
        let selectedTime = 60, gameTick = 0, alertText = "", alertTimer = 0, floatTexts = [];
        let highScore = localStorage.getItem('oceanHighScore') || 0;
        highScoreDisplay.innerText = highScore;

        let hook = {
            x: canvas.width / 2, y: 55, angle: 0, angleDir: 1, length: 40,
            extending: false, returning: false, 
            baseSpeed: 3, // TỐC ĐỘ NÉM DÂY ĐÃ CHỈNH THÀNH 3
            currentPullSpeed: 2.5, 
            rotationSpeed: 0.012,
            targetItem: null
        };

        const trashPool = [
            '🦴', '🦴', '🦴', '🦴', '🦴', '🦴', 
            '🍎', '🍎', '🍎', '🍎', '🍎', '🍎', 
            '🥫', '🥫', '🥫', '🥫', '🥫', 
            '👞', '👞', '👞'
        ]; 
        const fishEmojis = ['🐠', '🐟'];

        timeButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isStarted || isGameOver) {
                    timeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTime = parseInt(btn.getAttribute('data-time'));
                    timeDisplay.innerText = selectedTime;
                }
            });
        });

        function getDistance(x1, y1, x2, y2) { return Math.sqrt((x2 - x1)**2 + (y2 - y1)**2); }

        function createItem(type) {
            const isFish = type === 'fish';
            let newItem;
            let attempts = 0;
            while (attempts < 30) {
                let selectedEmoji = isFish ? fishEmojis[Math.floor(Math.random()*2)] : trashPool[Math.floor(Math.random()*trashPool.length)];
                newItem = {
                    x: Math.random() * (canvas.width - 140) + 70,
                    y: Math.random() * (canvas.height - 220) + 160, 
                    emoji: selectedEmoji,
                    size: isFish ? (Math.random() * 12 + 35) : (Math.random() * 10 + 30),
                    type: type, 
                    points: selectedEmoji === '👞' ? 100 : 50,
                    offset: Math.random() * 200, swimSpeed: Math.random() * 0.04 + 0.02
                };
                if (!items.some(item => getDistance(newItem.x, newItem.y, item.x, item.y) < 80)) break;
                attempts++;
            }
            return newItem;
        }

        function drawBackground() {
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#e0f7fa');
            gradient.addColorStop(0.2, '#4fc3f7');
            gradient.addColorStop(1, '#01579b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function initGame() {
            cancelAnimationFrame(animationId);
            clearInterval(timerInterval);
            score = 0; timeLeft = selectedTime; isGameOver = false; isPaused = false; isStarted = false;
            alertText = ""; alertTimer = 0; floatTexts = [];
            hook.length = 40; hook.extending = false; hook.returning = false; hook.targetItem = null;
            scoreDisplay.innerText = score;
            timeDisplay.innerText = timeLeft;
            timeDisplay.style.color = "#2c3e50";
            
            startBtn.style.display = "inline-block";
            timeModeContainer.style.display = "flex";
            pauseBtn.style.display = "none";
            resetBtn.style.display = "none";
            
            items = [];
            for(let i=0; i<6; i++) items.push(createItem('trash'));
            for(let i=0; i<3; i++) items.push(createItem('fish'));
            drawBackground();
            
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.fillRect(100, 200, 600, 100);
            ctx.fillStyle = "#004d40"; ctx.textAlign = "center"; ctx.font = "bold 20px Arial";
            ctx.fillText("Nhấn 'Bắt đầu ngay' để giải cứu các bạn cá nhé! ✨", canvas.width/2, canvas.height/2 + 10);
        }

        function endGame(isSurrender = false) {
            isGameOver = true; 
            isStarted = false;
            clearInterval(timerInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('oceanHighScore', highScore);
                highScoreDisplay.innerText = highScore;
            }
            ctx.fillStyle = "rgba(0, 50, 50, 0.9)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffeb3b"; ctx.font = "bold 35px Arial";
            ctx.fillText(isSurrender ? "Hẹn gặp lại bạn sớm nha! ✨" : "Oa! Bạn giỏi quá đi! 🎉", canvas.width/2, canvas.height/2 - 30);
            ctx.fillStyle = "white"; ctx.font = "20px Arial";
            ctx.fillText("Chúng mình đã gom được " + score + " điểm rác đó!", canvas.width/2, canvas.height/2 + 30);
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; ctx.font = "italic 16px Arial";
            ctx.fillText("Đừng quên bảo vệ môi trường cả ở ngoài đời thực nhé! 🌱", canvas.width/2, canvas.height/2 + 80);
            
            startBtn.style.display = "inline-block";
            pauseBtn.style.display = "none";
            resetBtn.style.display = "none";
            timeModeContainer.style.display = "flex";
        }

        function animate() {
            if (!isStarted || isGameOver) return;
            if (!isPaused) {
                gameTick++;
                drawBackground();
                if (items.filter(i => i.type === 'trash').length < 5) items.push(createItem('trash'));
                if (items.filter(i => i.type === 'fish').length < 3) items.push(createItem('fish'));

                items.forEach(item => {
                    let swimX = item.type === 'fish' ? Math.sin((gameTick + item.offset) * item.swimSpeed) * 8 : 0;
                    ctx.font = `${item.size}px Arial`; ctx.textAlign = "center";
                    ctx.fillText(item.emoji, item.x + swimX, item.y);
                });

                if (!hook.extending && !hook.returning) {
                    hook.angle += hook.rotationSpeed * hook.angleDir;
                    if (Math.abs(hook.angle) > 1.4) hook.angleDir *= -1;
                } else if (hook.extending) {
                    hook.length += hook.baseSpeed; 
                    items.forEach((item, index) => {
                        let d = getDistance(hook.x + Math.sin(hook.angle)*hook.length, hook.y + Math.cos(hook.angle)*hook.length, item.x, item.y);
                        if (d < 30) { 
                            hook.extending = false; 
                            hook.returning = true; 
                            hook.targetItem = index;
                            hook.currentPullSpeed = 1.5;
                        }
                    });
                    if (hook.length > 460) { 
                        hook.extending = false; 
                        hook.returning = true;
                        hook.currentPullSpeed = 2.5;
                    }
                } else if (hook.returning) {
                    hook.length -= hook.currentPullSpeed;
                    if (hook.targetItem !== null) {
                        items[hook.targetItem].x = hook.x + Math.sin(hook.angle) * hook.length;
                        items[hook.targetItem].y = hook.y + Math.cos(hook.angle) * hook.length;
                    }
                    if (hook.length <= 40) {
                        if (hook.targetItem !== null) {
                            const caught = items[hook.targetItem];
                            if (caught.type === 'fish') {
                                timeLeft -= 5; alertText = "Ui da! Đừng bắt nhầm các bạn cá nha! 🐠 (-5s)"; alertTimer = 120;
                            } else {
                                score += caught.points; scoreDisplay.innerText = score;
                                floatTexts.push({ x: hook.x, y: 100, text: "+" + caught.points, life: 40 });
                            }
                            items.splice(hook.targetItem, 1); hook.targetItem = null;
                        }
                        hook.returning = false;
                    }
                }

                const hX = hook.x + Math.sin(hook.angle) * hook.length;
                const hY = hook.y + Math.cos(hook.angle) * hook.length;
                ctx.beginPath(); ctx.moveTo(hook.x, hook.y); ctx.lineTo(hX, hY);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();
                ctx.font = "30px Arial"; ctx.fillText("⚓", hX, hY);

                floatTexts.forEach((ft, i) => {
                    ctx.fillStyle = `rgba(178, 255, 89, ${ft.life/40})`; ctx.font = "bold 20px Arial";
                    ctx.fillText(ft.text, ft.x, ft.y); ft.y--; ft.life--;
                    if (ft.life <= 0) floatTexts.splice(i, 1);
                });

                if (alertTimer > 0) {
                    ctx.fillStyle = "#ff5252"; ctx.font = "bold 22px Arial";
                    ctx.fillText(alertText, canvas.width/2, 100); alertTimer--;
                }
            } else {
                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.font = "bold 25px Arial"; ctx.fillText("Đại dương đang nghỉ ngơi tí thôi...", canvas.width/2, canvas.height/2);
            }
            animationId = requestAnimationFrame(animate);
        }

        function handleAction() { if (isStarted && !isPaused && !hook.extending && !hook.returning && !isGameOver) hook.extending = true; }
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleAction(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); }, {passive: false});
        canvas.addEventListener('mousedown', (e) => { handleAction(); });

        startBtn.addEventListener('click', () => {
            initGame();
            isStarted = true;
            startBtn.style.display = "none";
            timeModeContainer.style.display = "none";
            pauseBtn.style.display = "inline-block";
            resetBtn.style.display = "inline-block";
            
            timerInterval = setInterval(() => { 
                if(!isPaused && !isGameOver) { 
                    timeLeft--; timeDisplay.innerText = Math.max(0, timeLeft); 
                    if(timeLeft <= 10) timeDisplay.style.color = "red";
                    if(timeLeft <= 0) endGame(); 
                }
            }, 1000);
            animate(); 
        });

        pauseBtn.addEventListener('click', () => { 
            isPaused = !isPaused; 
            if (isPaused) {
                pauseBtn.innerText = "Tiếp tục nhé";
                resetBtn.style.display = "none";
            } else {
                pauseBtn.innerText = "Tạm dừng tí";
                resetBtn.style.display = "inline-block";
            }
        });

        resetBtn.addEventListener('click', () => { if(isStarted && !isGameOver) endGame(true); else initGame(); });

        initGame();
    </script>
</body>
</html>
